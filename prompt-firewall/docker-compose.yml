version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aegis:aegis@db:5432/aegis_db
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - ENABLE_LLM_GUARD=true
      - LLM_GUARD_READINESS_MODE=strict
      - WS_MAX_CONNECTIONS=50
      - WS_HEARTBEAT_INTERVAL=30
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./rules:/app/rules:ro
      - model_cache:/root/.cache

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=aegis
      - POSTGRES_DB=aegis_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
  model_cache:
